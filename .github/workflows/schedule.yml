name: Roco Merchant Notifier (Email)

on:
  # schedule:
  #   # 北京时间 08:00, 12:00, 16:00, 20:00 刷新
  #   # 提前 5 分钟排队 (对应 UTC 23:55, 3:55, 7:55, 11:55)
  #   - cron: '0 0,4,8,12 * * *'
  workflow_dispatch:

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 缓存 pip 依赖包
      - name: Cache pip packages
        uses: actions/cache@v3
        id: pip-cache
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 缓存 Playwright 浏览器（约170MB）
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers & system deps
        run: |
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei
          
      - name: Run Notifier Script with Retry
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          retry_wait_seconds: 60
          command: |
            export ROCOM_API_KEY=${{ secrets.ROCOM_API_KEY }}
            export EMAIL_SMTP_HOST="smtp.qq.com"
            export EMAIL_SMTP_PORT="465"
            export EMAIL_USER=${{ secrets.EMAIL_USER }}
            export EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            export EMAIL_FROM=${{ secrets.EMAIL_USER }}
            export EMAIL_TO=${{ secrets.EMAIL_TO }}
            python main.py
