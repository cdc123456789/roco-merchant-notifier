name: Roco Merchant Notifier (Email)

on:
  # schedule:
  #   # 北京时间 08:00, 12:00, 16:00, 20:00 刷新
  #   # 提前 5 分钟排队 (对应 UTC 23:55, 3:55, 7:55, 11:55)
  #   - cron: '0 0,4,8,12 * * *'
  workflow_dispatch:

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright jinja2

      - name: Install Playwright Browsers & OS Dependencies
        run: |
          playwright install chromium --with-deps
          # 安装中文字体，保证截图不乱码
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Run Notifier Script
        env:
          # 游戏 API 密钥（必需）
          ROCOM_API_KEY: ${{ secrets.ROCOM_API_KEY }}
          
          # 邮件配置（全部必需）
          EMAIL_SMTP_HOST: "smtp.qq.com"
          EMAIL_SMTP_PORT: "465"
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_USER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py
