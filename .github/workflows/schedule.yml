name: Roco Merchant Notifier

on:
  schedule:
    # 每天北京时间 08:00, 12:00, 16:00, 20:00 商人刷新
    # GitHub 使用 UTC 时间 (北京时间减 8 小时)
    # 为对抗 GitHub Actions 的排队延迟，设定提前 5 分钟触发排队 (即 55 分)
    - cron: '55 23,3,7,11 * * *'
  workflow_dispatch: # 允许在 GitHub 网页端手动点击运行

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: Install Playwright Browsers & OS Dependencies
        # 这是生成图片最核心的一步，安装 Chromium 浏览器和运行所需的系统依赖
        run: |
          playwright install chromium --with-deps

      - name: Run Notifier Script
        env:
          # 从 GitHub Secrets 中读取敏感的 Key，映射为环境变量供 main.py 使用
          ROCOM_API_KEY: ${{ secrets.ROCOM_API_KEY }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}
          NOTIFYME_UUID: ${{ secrets.NOTIFYME_UUID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python main.py
